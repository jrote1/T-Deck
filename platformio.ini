; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[env:esp32s3_120_16_8-qio_opi]
platform = espressif32
board = T-Deck
framework = arduino
upload_speed = 921600
monitor_speed = 115200
board_build.filesystem = spiffs
monitor_rts = 0
monitor_dtr = 0

[env]
build_flags =
    -IC:/Users/jaker/Documents/PlatformIO/Projects/TDeck/lib/MeshCore/examples/companion_radio
    -IC:/Users/jaker/Documents/PlatformIO/Projects/TDeck/lib/MeshCore/variants/lilygo_tdeck
    -IC:/Users/jaker/Documents/PlatformIO/Projects/TDeck/lib/MeshCore/lib/ed25519

    -DLV_CONF_INCLUDE_SIMPLE=1
    -DLV_USE_IMGFONT
    -DENV_INCLUDE_GPS
    -DLV_LVGL_H_INCLUDE_SIMPLE

    -DUSER_SETUP_LOADED=1
    -DUSER_SETUP_ID=210
    -DST7789_DRIVER
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_RGB_ORDER=TFT_RGB
    -DINIT_SEQUENCE_2         
    -DTFT_MISO=38
    -DTFT_MOSI=41
    -DTFT_SCLK=40
    -DTFT_CS=12 
    -DTFT_DC=11
    -DTFT_RST=-1  
    -DTFT_BACKLIGHT_ON=1
    -DLOAD_GLCD   
    -DLOAD_FONT2  
    -DLOAD_FONT4  
    -DLOAD_FONT6  
    -DLOAD_FONT7  
    -DLOAD_FONT8  
    -DLOAD_GFXFF  
    -DSMOOTH_FONT
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000

    -D USE_SX1262
    -D RADIO_CLASS=CustomSX1262
    -D WRAPPER_CLASS=CustomSX1262Wrapper
    -D LORA_TX_POWER=22
    -D MAX_GROUP_CHANNELS=10
    
    -D P_LORA_DIO_1=45 ; LORA IRQ pin
    -D P_LORA_NSS=9    ; LORA SS pin
    -D P_LORA_RESET=17 ; LORA RST pin
    -D P_LORA_BUSY=13  ; LORA Busy pin
    -D P_LORA_SCLK=40  ; LORA SCLK pin
    -D P_LORA_MISO=38  ; LORA MISO pin
    -D P_LORA_MOSI=41  ; LORA MOSI pin
    -D PIN_GPS_RX=43
    -D PIN_GPS_TX=44
    -D GPS_BAUD_RATE=38400

    -D BLE_PIN_CODE=123456

    -DRADIOLIB_STATIC_ONLY=1 -DRADIOLIB_GODMODE=1
    -D LORA_FREQ=869.618
    -D LORA_BW=62.5
    -D LORA_SF=8

    -D ESP32
    -D ESP32_PLATFORM
    -D PIN_USER_BTN=0
    -D PIN_PERF_POWERON=10

    -D ENABLE_PRIVATE_KEY_IMPORT=1   ; NOTE: comment these out for more secure firmware
    -D ENABLE_PRIVATE_KEY_EXPORT=1

    -DLV_USE_TFT_ESPI=1
    -DUSE_HSPI_PORT
    -fexceptions
build_unflags = -fno-exceptions
build_src_filter =
    +<../src/**/*.cpp>
    +<../src/emojis/*.c>
    +<../lib/MeshCore/examples/companion_radio/*.cpp>
    +<../lib/MeshCore/helpers/sensors/*.cpp>
    -<../lib/MeshCore/examples/companion_radio/main.cpp>
    +<../lib/MeshCore/variants/lilygo_tdeck/*.cpp>
    +<../lib/MeshCore/lib/ed25519/*.c>
lib_deps =
    bodmer/TFT_eSPI@2.5.43
	lvgl/lvgl@^9.2.2
    tonywestonuk/GT911 Lite@^1.0.2
  
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.11.0

    stevemarple/MicroNMEA @ ^2.0.6
    FS
    SPIFFS
    rweather/Crypto @ ^0.4.0
    densaugeo/base64 @ ~1.4.0